<!DOCTYPE html>
<html>
<head>
  <title>AI Humanizer</title>
</head>
<body>

<h2>AI Humanizer (Strong Mode)</h2>

<textarea id="text" placeholder="Paste text here..." rows="10" cols="50"></textarea>
<br><br>

<button onclick="humanize()">Humanize</button>

<pre id="output"></pre>

<script>
async function humanize() {
  const text = document.getElementById("text").value;

  const res = await fetch("https://YOUR-RAILWAY-URL/humanize", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text })
  });

  const data = await res.json();
  document.getElementById("output").innerText = data.result;
}
</script>

</body>
</html>
